<!DOCTYPE html>
<html>
<head>
<title>Task Manager</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    padding: 2em;
    background: #eef;
  }

  h1 { font-size: 2.5em; margin-bottom: 0; }

  .desc {
    color: #444;
    margin-bottom: 1em;
  }

  input {
    padding: 10px;
    width: 220px;
  }

  button {
    padding: 10px;
    cursor: pointer;
  }

  li {
    list-style: none;
    background: white;
    color: black;
    margin: 8px auto;
    width: 260px;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>📋 Task Manager</h1>
<p class="desc">Create, manage, and delete your daily tasks. Click a task to remove it.</p>

<input id="taskInput" placeholder="New task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function renderTasks() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  tasks.forEach((task, index) => {
    const li = document.createElement("li");
    li.textContent = task;

    li.onclick = () => {
      tasks.splice(index, 1);
      localStorage.setItem("tasks", JSON.stringify(tasks));
      renderTasks();
    };

    list.appendChild(li);
  });
}

function addTask() {
  const input = document.getElementById("taskInput");
  if (!input.value) return;

  tasks.push(input.value);
  input.value = "";

  localStorage.setItem("tasks", JSON.stringify(tasks));
  renderTasks();
}

renderTasks();
</script>

</body>
</html>
